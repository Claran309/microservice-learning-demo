input {
  beats {
    port => 5044
  }
}

filter {
  # 解析 JSON 格式的日志
  json {
    source => "message"
  }

  # 添加时间戳
  date {
    match => [ "timestamp", "ISO8601" ]
    target => "@timestamp"
  }

  # 移除不必要的字段
  mutate {
    remove_field => [ "message", "host", "agent", "ecs", "input" ]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "services-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}